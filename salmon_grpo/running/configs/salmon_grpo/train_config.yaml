model:
  llama_path: /path/to/checkpoints/llm/vicuna-7b-v1.1
  whisper_path: /path/to/checkpoints/whisper/whisper-large-v2
  beats_path: ''
  ckpt: './experiments/salmon/experiments/salmon_grpo/runs/202511301402/checkpoint_3.pth'
  freeze_whisper: true
  freeze_beats: true
  use_speech_Qformer: true
  freeze_speech_QFormer: false
  window_level_Qformer: true
  num_speech_query_token: 1
  second_per_window: 0.333333
  second_stride: 0.333333
  speech_llama_proj_model: ''
  freeze_speech_llama_proj: false
  lora: true
  lora_rank: 128
  lora_alpha: 256
  lora_dropout: 0.1
  multi_prompt: true
  prompt_template: 'USER: {}

    ASSISTANT:'
  prompt_path: src/prompts/antispoofing_prompts_reasoning.json
  test_prompt_path: src/prompts/antispoofing_prompts_reasoning.json
  max_txt_len: 512
  end_sym: </s>
  use_class_weights: true
  gradient_checkpointing: true

datasets:
  train_ann_path: /path/to/data/salmonn/train_salmonn_1.46M_clean.json
  valid_ann_path: /path/to/data/salmonn/valid_salmonn_163K.json
  test_ann_path: /path/to/data/salmonn/test_salmonn_140K.json
  whisper_path: /path/to/checkpoints/whisper/whisper-large-v2
  max_train_samples: null
  max_valid_samples: 500
  max_test_samples: null
  
run:
  seed: 42
  output_dir: ./experiments/salmon/experiments/salmon_grpo/runs
  output_folder: ''
  evaluate: false
  log_freq: 5
  epoch_based: false
  iters_per_epoch: 50
  accum_grad_iters: 4
  batch_size_train: 4
  batch_size_eval: 4
  num_workers: 1
  device: cuda
  use_distributed: true
  amp: false
  world_size: 1
  dist_url: env://

  dataset_starting_epoch: 4

  optims:
    max_epoch: 10
    warmup_steps: 50
    warmup_start_lr: 1.0e-08
    init_lr: 1.0e-06
    min_lr: 1.0e-08
    weight_decay: 0.05
    beta2: 0.999

  mls:
    num_gpus: 4

  kl_coef: 0.1
  num_grpo_samples: 8

  dist_backend: nccl

# New Reward Configuration
reward:
  mode: "label_guided"  # Options: "label_guided" (default), "reasoning_match"
  judge_weight: 0.3     # Global scalar for the judge component
  
  # Weights for specific components in label_guided mode
  weights:
    correctness: 0.6    # Hard check (Binary)
    format: 0.1         # Hard check (Valid XML)
    structure: 0.1      # Bonus for nice tags
    length: 0.05        # Soft bonus
  
generate:
  max_new_tokens: 300
  min_length: 1
  num_beams: 1
  top_p: 0.8
  temperature: 0.7
  repetition_penalty: 1
  do_sample: true

# Judge configuration for LLM-as-a-Judge reward computation
judge:
  type: "neighbor"  # Options: "internal", "openrouter", "neighbor"
  
  # Neighbor-specific configuration (only used when type: "neighbor")
  neighbor:
    model_path: "Qwen/Qwen2.5-3B-Instruct"
    device_map: "auto"
    load_in_4bit: true
    torch_dtype: "float16"

  # OpenRouter-specific configuration (only used when type: "openrouter")
  openrouter:
    api_key: null  # If null, uses OPENROUTER_API_KEY environment variable
    model: "anthropic/claude-3.5-sonnet"  # Options: anthropic/claude-3.5-sonnet, openai/gpt-4o, google/gemini-pro-1.5, deepseek/deepseek-chat
    max_retries: 3  # Number of retry attempts on API failure
    retry_delay: 1.0  # Initial retry delay in seconds (doubles each retry)
    timeout: 30  # Request timeout in seconds
