General:
    output_dir: ./experiments/unified_training/outputs/salmon_grpo

Model:
    model_name: salmon
    ckpt: "./experiments/unified_training/outputs/salmon_grpo/run_2026_02_07_10_01/checkpoints/grpo_epoch_0_best.pt" # Path to fine-tuned checkpoint if any
    
    lora:
        enabled: true
        alpha: 32
        rank: 256
        lora_dropout: 0.1
        projections: all
        
    amp: false
    max_txt_len: 512
    
    additional_kwargs:
        salmon:
            pretrained_ckpts:
                llama_path: "lmsys/vicuna-7b-v1.1"
                whisper_path: "openai/whisper-large-v2"
                beats_path: "" # Set valid path or keep empty if not using BEATs

            freeze_whisper: true
            whisper_unfreeze_last_n_layers: 0
            whisper_unfreeze_attention_only: false
            
            use_speech_Qformer: true
            num_speech_query_token: 1
            freeze_speech_QFormer: false
            
            # Default window settings
            window_level_Qformer: true
            second_per_window: 0.333333
            second_stride: 0.333333
            
            speech_llama_proj_model: ""
            freeze_speech_llama_proj: false

Logger:
    log_freq: 10

Datasets:
    # dataset_train_path: "/path/to/data/reasoning/reasoning_train_114k.json"
    # dataset_train_path: "/path/to/data/hard_label/hard_label_train_1185k.json"
    dataset_train_path: "/path/to/data/reasoning/reasoning_val_8k.json"

    # dataset_val_path: "/path/to/data/hard_label/hard_label_val_133k.json"
    dataset_val_path: "/path/to/data/reasoning/reasoning_val_8k.json"

    # dataset_test_path: "/path/to/data/reasoning/reasoning_test_1k.json"
    dataset_test_path: "/path/to/data/hard_label/hard_label_val_133k.json"
    # dataset_test_path: "/path/to/data/hard_label/hard_label_test_140k.json"
    
    max_train_samples: 3000
    max_valid_samples: 1000
    max_test_samples: null

    # Offsets (skip first N samples; useful for interrupted runs or subset evaluation)
    train_samples_offset: 4900     # offset for training dataset (samples_offset is deprecated alias)
    val_samples_offset: 0      # offset for validation dataset
    test_samples_offset: 0     # offset for test dataset  
    
    use_oversampling: false
    use_class_weights: false
    shuffle: false

Prompts:
    reasoning_prompts: "src/prompts/antispoofing_reasoning_prompt.json"
    hard_label_prompts: "src/prompts/antispoofing_prompt.json"

Runner:
    type: train # train | test
    trainer: GRPO # SFT | GRPO | Distillation
    
    # Common settings (can be overridden per trainer if needed)
    num_gpus: 8
    num_workers: 0
    
    SFT:
        task_type: reasoning # hard_label | reasoning
        batch_size_train: 4
        batch_size_eval: 4
        
        num_epochs: 10
        iters_per_epoch: null # null = full dataset, or int
        iters_per_epoch_val: null
        accum_grad_iters: 1
        
        optimizator:
            init_lr: 1.0e-4
            min_lr: 1.0e-6
            warmup_start_lr: 1.0e-6
            warmup_steps: 100
            weight_decay: 0.05
            beta2: 0.999
            
    GRPO:
        batch_size_train: 1
        batch_size_eval: 8
        
        num_epochs: 30
        iters_per_epoch: 10
        iters_per_epoch_val: null
        accum_grad_iters: 1
        
        num_generations: 8
        beta: 0 # KL penalty
        filter_controversial: true  # If true: skeptic mode - only train on samples with mix of correct/incorrect (reject all-correct, all-incorrect)
        skeptic_batch_size: 2    # Samples per check batch (rollouts to filter at a time); null = use dataloader batch
        skeptic_buffer_size: 1   # Min controversial samples before main GRPO loop starts (default: num_generations)
        
        
        # Generation settings for GRPO rollouts (same keys as Test.generation)
        generation:
            max_new_tokens: 5000
            num_beams: 1
            do_sample: true
            temperature: 1
            top_p: 0.9
        
        judge: format # format | openrouter | local_llm
        
        weights:
            correctness: 0.5
            format: 0.3
            reasons_correctness: 0.2   # Set >0 when using reasoning dataset with reasons
            llm_judge: 0.0
        
        LLM_judge:
            model: "/path/to/checkpoints/llm/Qwen2.5-7B-Instruct" # Path to locally downloaded Qwen
            token: "YOUR_OPENROUTER_TOKEN"
            device: "cuda:0" # for local_llm
            judge_prompts: "src/prompts/judge_prompts.json"
            max_new_tokens: 5000
            temperature: 0.0
            
            aspect_weights:
                detail: 0.25
                relevance: 0.25
                logic: 0.25
                helpfulness: 0.25
            
        optimizator:
            init_lr: 1.0e-4 # Usually lower for RL
            min_lr: 1.0e-5
            warmup_start_lr: 1.0e-5
            warmup_steps: 5
            weight_decay: 0.05
            beta2: 0.999

    Distillation:
        num_distillation_iters: 3
        
        intermediate_dataset_forming:
            num_generations: 8
            
            # Filtering criteria
            max_correct: 8
            min_correct: 4
