General:
    output_dir: outputs/salmon_sft_reasoning

Model:
    model_name: salmon
    ckpt: ""
    
    lora:
        enabled: true
        alpha: 32
        rank: 256
        lora_dropout: 0.1
        projections: all
        
    amp: false
    max_txt_len: 5000
    
    additional_kwargs:
        salmon:
            pretrained_ckpts:
                llama_path: "lmsys/vicuna-7b-v1.1"
                whisper_path: "openai/whisper-large-v2"
                beats_path: "" # Set valid path or keep empty if not using BEATs
            
            freeze_whisper: true
            whisper_unfreeze_last_n_layers: 0
            whisper_unfreeze_attention_only: false
            
            use_speech_Qformer: true
            num_speech_query_token: 1
            freeze_speech_QFormer: false
            
            # Default window settings
            window_level_Qformer: true
            second_per_window: 0.333333
            second_stride: 0.333333
            
            speech_llama_proj_model: ""
            freeze_speech_llama_proj: false

Logger:
    log_freq: 1

Datasets:
    dataset_train_path: "./artifacts/data/meta_datasets/reasoning/reasoning_train_114k_exists.json"
    dataset_val_path: "./artifacts/data/meta_datasets/hard_label/hard_label_test_140k.json"
    dataset_test_path: "./artifacts/data/meta_datasets/hard_label/hard_label_full_test_680k.json"

    max_train_samples: null
    max_valid_samples: 1000
    max_test_samples: 20000


    use_oversampling: false
    use_class_weights: true
    shuffle: true # Whether to shuffle training data

Prompts:
    reasoning_prompts: "src/prompts/antispoofing_reasoning_prompt.json"
    hard_label_prompts: "src/prompts/antispoofing_prompt.json"

Runner:
    type: train # train | test
    trainer: SFT # SFT | GRPO | Distillation
    
    # Common settings (can be overridden per trainer if needed)
    num_gpus: 1
    
    SFT:
        task_type: reasoning # hard_label | reasoning
        batch_size_train: 16
        batch_size_eval: 16
        accum_grad_iters: 16
        
        num_epochs: 10
        iters_per_epoch: 1600 # null = full dataset, or int
        iters_per_epoch_val: null
        
        optimizator:
            init_lr: 1.0e-4 # Lowered from 1e-4 for stability
            min_lr: 1.0e-6
            warmup_start_lr: 1.0e-7
            warmup_steps: 100 # Increased from 10
            weight_decay: 0.05
            beta2: 0.999
            # max_grad_norm: 0.2

        generation:
            max_new_tokens: 256
            num_beams: 1
            do_sample: false

    GRPO:
        batch_size_train: 4
        batch_size_eval: 12
        
        num_epochs: 2
        iters_per_epoch: 10
        iters_per_epoch_val: null
        accum_grad_iters: 1
        
        num_generations: 8
        beta: 0.1 # KL penalty
        
        judge: llm # hard_label | llm
        
        LLM_judge:
            backend: local # local | openrouter
            model: "openai/gpt-4o"
            token: "YOUR_TOKEN"
            judge_prompts: "src/prompts/judge_prompts.json"
            
        optimizator:
            init_lr: 1.0e-5 # Usually lower for RL
            min_lr: 1.0e-7
            warmup_steps: 5
            weight_decay: 0.05
            beta2: 0.999

    Distillation:
        num_distillation_iters: 3
        
        intermediate_dataset_forming:
            num_generations: 8
            
            # Filtering criteria
            max_correct: 8
            min_correct: 4

    Test:
        # Format the model was trained with
        # Options: reasoning | hard_label
        # If not set, defaults to SFT.task_type
        model_format: reasoning
        
        # Format of the test dataset (can differ from model_format for cross-evaluation)
        # Options: reasoning | hard_label
        # - reasoning model on hard_label dataset: extracts answer, reports accuracy only
        # - hard_label model on reasoning dataset: NOT SUPPORTED
        # If not set, defaults to model_format
        dataset_format: reasoning
        
        # Batch size for testing
        batch_size: 24
        
        # Save all predictions to JSONL file (can be large for big datasets)
        # File: predictions_{type}_epoch_{n}.jsonl
        save_all_predictions: true
        
        # Extract Real/Fake token probabilities for confidence analysis
        # Adds: real_prob, fake_prob, confidence to each prediction
        # Adds: confidence_mean, confidence_std, etc. to metrics
        extract_confidence: true
        
        # Generation settings
        generation:
            max_new_tokens: 5000   # Max tokens to generate
            num_beams: 1            # Beam search beams (1 = greedy)
            do_sample: false        # Whether to sample
            temperature: 1.0        # Sampling temperature (if do_sample=true)
            top_p: 0.9              # Top-p sampling (if do_sample=true)

